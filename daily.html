<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>NSPCL Power Pulse - Daily Challenge</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="daily-page">


<!-- HERO -->

<section class="daily-hero">

<h1>⚡ NSPCL Power Pulse</h1>

<h2>Daily Challenge</h2>

<p>
Test your knowledge. Learn something new every day.
</p>

</section>



<!-- QUESTION -->

<section class="daily-card">


<h2>🔥 Today's Question</h2>


<div id="dailyQuestion">

Loading today's challenge...

</div>



<div id="dailyOptions"></div>


<button onclick="submitDaily()" class="daily-btn">

Submit Answer

</button>


<div id="dailyResult"></div>


</section>





<!-- MOTIVATION -->


<section class="daily-card quote-card">


<h2>🌟 Daily Motivation</h2>


<p id="dailyQuote">

Loading motivation...

</p>


</section>






<!-- STATS -->


<section class="daily-grid">


<div class="daily-stat">

<h3 id="streak">
0
</h3>

<p>
Daily Streak
</p>

</div>



<div class="daily-stat">

<h3 id="points">
0
</h3>

<p>
Power Points
</p>

</div>



<div class="daily-stat">

<h3>
⚡
</h3>

<p>
Keep Learning
</p>

</div>



</section>



</div>



<script src="daily.js"></script>


</body>

</html>
