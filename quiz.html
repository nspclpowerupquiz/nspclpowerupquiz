<script>


// =============================
// LOGIN CHECK
// =============================


let employee =
localStorage.getItem("employee");


if(employee==null){

window.location.href="login.html";

}




document.getElementById("welcomeUser").innerHTML =

"Welcome Employee : <b>" + employee + "</b>";




// =============================
// QUESTIONS
// =============================


let questions = [];
async function loadQuestions() {

    try {

        const response = await fetch("questions.json");

        if (!response.ok) {
            throw new Error("Cannot load questions.json");
        }

        questions = await response.json();

    } catch (error) {

        alert("Unable to load quiz questions.");

        console.error(error);

    }

}

{

question:"NSPCL is a joint venture between NTPC and which company?",

options:[
"SAIL",
"BHEL",
"ONGC",
"GAIL"
],

answer:"SAIL"

},


{

question:"Which department handles Contracts and Materials management?",

options:[
"C&M",
"Finance",
"HR",
"IT"
],

answer:"C&M"

},


{

question:"Which gas is essential for human breathing?",

options:[
"Carbon dioxide",
"Oxygen",
"Nitrogen",
"Hydrogen"
],

answer:"Oxygen"

},


{

question:"Capital of India is:",

options:[
"Mumbai",
"Delhi",
"Kolkata",
"Chennai"
],

answer:"Delhi"

},


{

question:"Which planet is called the Red Planet?",

options:[
"Earth",
"Mars",
"Jupiter",
"Venus"
],

answer:"Mars"

},


{

question:"Procurement mainly deals with:",

options:[
"Buying goods and services",
"Employee training",
"Power generation",
"Accounting"
],

answer:"Buying goods and services"

},


{

question:"Inventory management focuses on:",

options:[
"Stock control",
"Marketing",
"Recruitment",
"Sales"
],

answer:"Stock control"

}


];





// =============================
// VARIABLES
// =============================


let currentQuestion=0;

let score=0;

let time=60;

let timer;






// =============================
// START QUIZ
// =============================


function startQuiz(){


document.querySelector(".quiz-intro").style.display="none";


document.getElementById("quiz-area").style.display="block";


startTimer();


loadQuestion();


}







// =============================
// TIMER
// =============================


function startTimer(){


timer=setInterval(function(){


time--;


document.getElementById("time").innerHTML=time;



if(time<=0){


clearInterval(timer);


showResult();


}


},1000);


}







// =============================
// LOAD QUESTION
// =============================


function loadQuestion(){


let q =
questions[currentQuestion];



document.getElementById("question").innerHTML =

(currentQuestion+1)+". "+q.question;




let html="";



q.options.forEach(function(option){


html +=

`

<button class="option"

onclick="checkAnswer(this,'${option}')">

${option}

</button>

`;


});



document.getElementById("options").innerHTML=html;



}







// =============================
// CHECK ANSWER
// =============================


function checkAnswer(button,answer){


let buttons =
document.querySelectorAll(".option");


buttons.forEach(btn=>{

btn.disabled=true;

});



if(answer==questions[currentQuestion].answer){


score++;

button.style.background="green";


}

else{


button.style.background="red";


}


}







// =============================
// NEXT QUESTION
// =============================


function nextQuestion(){


currentQuestion++;



if(currentQuestion < questions.length){


loadQuestion();


}

else{


showResult();


}


}







// =============================
// RESULT
// =============================


function showResult(){


clearInterval(timer);



document.getElementById("quiz-area").style.display="none";



document.getElementById("result").innerHTML =


`

🎉 Congratulations ${employee}

<br><br>

Your Score

<h1>

${score}/${questions.length}

</h1>


`;



localStorage.setItem("score",score);



}



</script>


</body>

</html>
