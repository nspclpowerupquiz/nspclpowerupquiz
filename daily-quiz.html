<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Mission | NSPCL Power-Up Quiz</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="header">

<h1>
⚡ NSPCL Power Pulse
</h1>

<p>
Daily Learning Mission
</p>

</header>





<section class="quiz-container">


<div class="challenge-card">


<h2>
🔥 Today's Power Challenge
</h2>


<div class="employee-info">

👋 Welcome 
<span id="employeeName">
Employee
</span>


<br><br>


🏆 Points:
<span id="points">
0
</span>


</div>



</div>







<div class="mission-info">


<p>

Question:

<strong>

<span id="questionNumber">
1
</span>

/

<span id="totalQuestions">
5
</span>

</strong>

</p>



<p>

⏳ Time:

<strong>

<span id="timer">
05:00
</span>

</strong>

</p>


</div>







<div class="progress-bar">


<div 
class="progress-fill"
id="progress">

</div>


</div>









<div class="question-card">


<h2 id="question">

Loading Question...

</h2>




<div id="options"
class="options">

</div>



</div>









<button 
id="nextBtn"
class="mission-btn"
onclick="nextQuestion()">

Next Question ➡️

</button>






<div id="result">

</div>



</section>








<footer>

© 2026 NSPCL Power-Up Quiz

<br>

Learn • Compete • Grow

</footer>







<script src="daily-quiz.js"></script>


</body>

</html>
