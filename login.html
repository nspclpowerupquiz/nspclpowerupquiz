<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSPCL Power Quiz Login</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>⚡ NSPCL Power-Up Quiz</h1>

<p>SSC C&M Function</p>

</header>



<section class="login-box">


<h2>🔐 Employee Login</h2>


<label>Employee ID</label>

<br>

<input 
type="text" 
id="employeeID"
placeholder="Enter Employee ID"
>


<br><br>


<label>Password</label>

<br>

<input 
type="password" 
id="password"
placeholder="Enter Password"
>


<br><br>


<button onclick="login()">
Login 🚀
</button>


<p id="message"></p>


</section>




<script>


function login()
{


let empID = document.getElementById("employeeID").value;

let password = document.getElementById("password").value;



if(empID === "" || password === "")
{

document.getElementById("message").innerHTML =
"⚠️ Please enter Employee ID and Password";

return;

}


// Initial password same as Employee ID

if(password === empID)
{


localStorage.setItem("employeeID", empID);


window.location.href = "quiz.html";


}

else
{


document.getElementById("message").innerHTML =
"❌ Invalid Employee ID or Password";


}



}


</script>



<footer>

<p>
⚡ NSPCL Power Quiz | Learn • Compete • Grow
</p>

</footer>


</body>

</html>
