<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSPCL Power-Up Quiz | Gallery</title>

<link rel="stylesheet" href="style.css">


<style>

/* PAGE */

body{

    margin:0;
    font-family:'Segoe UI',sans-serif;

    background:
    linear-gradient(135deg,#061a40,#003566,#0077b6);

    color:white;

}


/* HEADER */

.gallery-header{

    text-align:center;

    padding:35px 20px;

    background:
    rgba(255,255,255,0.12);

    backdrop-filter:blur(12px);

    box-shadow:
    0 8px 25px rgba(0,0,0,0.3);

}


.gallery-header h1{

    font-size:42px;

    margin:10px;

}


.gallery-header p{

    font-size:18px;

    opacity:.9;

}



/* BACK BUTTON */

.back-btn{

    display:inline-block;

    margin-top:20px;

    padding:12px 28px;

    background:#ffcc00;

    color:#003566;

    border-radius:30px;

    text-decoration:none;

    font-weight:bold;

    transition:.3s;

}


.back-btn:hover{

    transform:scale(1.08);

}



/* GALLERY GRID */

.gallery-container{

    padding:40px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:30px;

}



/* IMAGE CARD */

.gallery-card{

    background:
    rgba(255,255,255,0.15);

    border-radius:22px;

    overflow:hidden;

    box-shadow:
    0 10px 30px rgba(0,0,0,.35);

    transition:.4s;

}


.gallery-card:hover{

    transform:
    translateY(-12px)
    scale(1.03);

}



/* IMAGE */

.gallery-card img{

    width:100%;

    height:240px;

    object-fit:cover;

    cursor:pointer;

    transition:.4s;

}


.gallery-card img:hover{

    transform:scale(1.08);

}



/* TITLE */

.gallery-title{

    padding:18px;

    text-align:center;

    font-size:20px;

    font-weight:700;

}



/* LOADING */

.loading{

    grid-column:1/-1;

    text-align:center;

    font-size:24px;

    padding:50px;

}




/* MOBILE */

@media(max-width:600px){


.gallery-container{

    padding:20px;

}


.gallery-header h1{

    font-size:30px;

}


}


</style>


</head>



<body>



<header class="gallery-header">


<h1>
📸 NSPCL Power-Up Gallery
</h1>


<p>
Moments of learning, competition and power sector awareness
</p>



<a href="index.html" class="back-btn">
⬅ Back to Home
</a>


</header>




<!-- LIVE GOOGLE SHEET GALLERY WILL LOAD HERE -->

<section 
id="galleryContainer" 
class="gallery-container">


<div class="loading">

⏳ Loading Gallery Images...

</div>


</section>




<!-- GOOGLE SHEET CONNECTED SCRIPT -->

<script src="gallery.js"></script>



</body>

</html>
