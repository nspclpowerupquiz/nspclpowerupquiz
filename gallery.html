<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSPCL Power-Up Quiz | Gallery</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#061a40,#003566,#0077b6);
    color:white;
}


/* HEADER */

.gallery-header{

    text-align:center;
    padding:30px 20px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);

    box-shadow:0 8px 25px rgba(0,0,0,0.3);

}


.gallery-header h1{

    font-size:40px;
    margin:10px;

}


.gallery-header p{

    font-size:18px;
    opacity:0.9;

}



/* BACK BUTTON */

.back-btn{

    display:inline-block;
    margin-top:15px;

    padding:10px 25px;

    background:#ffcc00;
    color:#003566;

    border-radius:30px;

    text-decoration:none;
    font-weight:bold;

    transition:.3s;

}


.back-btn:hover{

    transform:scale(1.08);

}



/* GALLERY AREA */

.gallery-container{

    padding:40px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:30px;

}



/* IMAGE CARD */

.gallery-card{

    background:rgba(255,255,255,0.15);

    border-radius:20px;

    overflow:hidden;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.35);

    transition:.4s;

}


.gallery-card:hover{

    transform:
    translateY(-10px)
    scale(1.03);

}



/* IMAGE */

.gallery-card img{

    width:100%;

    height:230px;

    object-fit:cover;

    display:block;

}



/* TITLE */

.gallery-title{

    padding:15px;

    text-align:center;

    font-size:20px;

    font-weight:bold;

}



/* LOADING */

.loading{

    text-align:center;

    font-size:22px;

    padding:40px;

}


</style>

</head>


<body>



<header class="gallery-header">


<h1>📸 NSPCL Power-Up Gallery</h1>

<p>
Moments of learning, competition and power sector awareness
</p>


<a href="index.html" class="back-btn">
⬅ Back to Home
</a>


</header>




<section id="galleryContainer" class="gallery-container">


<div class="loading">

Loading Gallery Images...

</div>


</section>



<script src="gallery.js"></script>


</body>

</html>
