<!-- ==========================
     NSPCL GALLERY SECTION
=========================== -->

<section class="gallery-section">

<h1 class="gallery-title">
    NSPCL Power-Up Quiz Gallery
</h1>

<p class="gallery-subtitle">
    Moments, achievements and celebrations from NSPCL Power-Up Quiz
</p>


<!-- FILTER BUTTONS -->

<div class="gallery-filter">

<button onclick="filterGallery('all')">
All
</button>

<button onclick="filterGallery('event')">
Events
</button>

<button onclick="filterGallery('quiz')">
Quiz
</button>

<button onclick="filterGallery('plant')">
Power Plant
</button>

<button onclick="filterGallery('award')">
Awards
</button>

</div>



<!-- IMAGE CONTAINER -->

<div id="galleryContainer" class="gallery-grid">

<!-- Images will load from Google Sheet -->

</div>


</section>



<!-- IMAGE POPUP -->

<div id="imagePopup" class="popup">

<span onclick="closePopup()" class="close">
×
</span>

<img id="popupImage">

<h3 id="popupTitle"></h3>

</div>
